{% extends 'core/base.html' %}

{% block content %}
<div class="container">
    <h1>Dashboard</h1>
    
    <!-- Total Products, Vendors, Customers, and Inventories Cards -->
    <div class="row mb-4">
        <!-- Total Products Card -->
        <div class="col-12 col-md-3">
            <div class="app-card total-products-card">
                <i class="fa fa-cube fa-3x"></i>
                <h2>{{ product_count }}</h2>
                <p>Total Products</p>
            </div>
        </div>

        <!-- Total Vendors Card -->
        <div class="col-12 col-md-3">
            <div class="app-card total-vendors-card">
                <i class="fa fa-industry fa-3x"></i>
                <h2>{{ vendor_count }}</h2>
                <p>Total Vendors</p>
            </div>
        </div>

        <!-- Total Customers Card -->
        <div class="col-12 col-md-3">
            <div class="app-card total-customers-card">
                <i class="fa fa-users fa-3x"></i>
                <h2>{{ customer_count }}</h2>
                <p>Total Customers</p>
            </div>
        </div>

        <!-- Total Inventories Card -->
        <div class="col-12 col-md-3">
            <div class="app-card total-inventories-card">
                <i class="fa fa-archive fa-3x"></i>
                <h2>{{ customer_count }}</h2>
                <p>Total Inventories</p>
            </div>
        </div>
    </div>

</div>
{% endblock %}

{% block pagecss %}
<style>
    /* Card styles */
    .app-card {
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        text-align: center;
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
    }

    .app-card h2 {
        font-size: 3em;
        font-weight: bold;
        margin: 10px 0;
    }

    .app-card p {
        font-size: 1.2em;
        font-weight: normal;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
    }

    /* Total Products Card */
    .total-products-card {
        background-color: #007bff; /* Blue */
    }

    .total-products-card i {
        color: #ffffff;
    }

    /* Total Vendors Card */
    .total-vendors-card {
        background-color: #28a745; /* Green */
    }

    .total-vendors-card i {
        color: #ffffff;
    }

    /* Total Customers Card */
    .total-customers-card {
        background-color: #6f42c1; /* Purple */
    }

    .total-customers-card i {
        color: #ffffff;
    }

    /* Total Inventories Card */
    .total-inventories-card {
        background-color: #fd7e14; /* Orange */
    }

    .total-inventories-card i {
        color: #ffffff;
    }

</style>

<!-- Add Font Awesome CDN for Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
{% endblock %}
