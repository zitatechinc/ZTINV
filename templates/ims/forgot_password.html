{% extends 'ims/index.html' %}
{% load static %}

  <!-- Bootstrap CSS -->
  <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
 <link href="{% static "fontawesome/css/all.min.css" %}" rel="stylesheet">
  <link rel="{% static 'fonts/all.min.css' %}">
  <link href="{% static 'css/css2.css' %}" rel="stylesheet">
  <script src="{% static 'js/jquery-3.6.0.min.js' %}"></script>
{%block mainblock%}
  {% comment %} <style>
    /* Background and layout */
    .page-wrapper {
      min-height: 100vh;
      background: url("{% static 'images/bg.jpg' %}") no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .login-card {
      display: flex;
      max-width: 600px;
      width: 90%;
      background-color: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      flex-direction: column; /* Ensure flexbox adapts on mobile */
      border: 1px solid #007080; 
    }

    .login-left {
      flex: 1;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-box img.logo-img {
      max-width: 150px;
      margin-bottom: 20px;
      display: block;
      margin: 0 auto;
    }

    h3 {
      text-align: center;
      margin-top: 15px;
    }

    .form-group {
      margin-bottom: 20px;
      font-size: 18px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .position-relative {
      position: relative;
    }

    .input-icon {
      position: absolute;
      top: 50%;
      left: 12px;
      transform: translateY(-50%);
      color: #999;
    }

    .toggle-password {
      position: absolute;
      top: 50%;
      right: 12px;
      transform: translateY(-50%);
      cursor: pointer;
      color: #999;
    }

    .form-control {
      width: 100%;
      padding: 10px 40px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 18px;
    }

    .btn.sign-in-btn {
      padding: 12px 0;
      font-size: 1.1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
    }

    .testimonial-box {
      text-align: center;
      padding: 0 20px;
    }

    .team-logos img {
      max-width: 180px;
      margin: 0 auto;
      display: block;
    }

    .error-message {
      color: #d9534f;
      font-size: 0.9rem;
      margin-top: 4px;
      min-height: 18px;
    }

    .message {
      text-align: center;
      font-weight: 600;
    }

    .message.success-message {
      color: green;
    }

    .message.error-message {
      color: red;
    }

    /* Mobile and Tablet responsiveness */
    @media (max-width: 768px) {
      .login-card {
        max-width: 90%;
        flex-direction: column;
      }

      .login-left {
        padding: 20px;
      }

      .form-group {
        font-size: 16px;
      }

      .form-control {
        font-size: 16px;
      }

      .btn.sign-in-btn {
        width: 100%;
        font-size: 16px;
        padding: 14px 0;
      }

      h3 {
        font-size: 24px;
      }

      .logo-img {
        max-width: 120px;
      }
    }

    /* Very small screens (smartphones in portrait mode) */
    @media (max-width: 480px) {
      .login-card {
        max-width: 100%;
        padding: 20px;
      }

      .form-group {
        font-size: 14px;
      }

      .form-control {
        font-size: 14px;
      }

      .btn.sign-in-btn {
        font-size: 14px;
        padding: 12px 0;
      }

      h3 {
        font-size: 22px;
      }

      .logo-img {
        max-width: 100px;
      }
    }
  </style> {% endcomment %}
</head>

<body>
 
          

         

          <form id="reset-password-form" action="javascript:void(0);">
            {% csrf_token %}
            <div class="container-fluid">
              <div class="card mt-4" style="border-color: #7cc2e6; margin:15px;">
                <div class="card-body" style="
                    background-color: #ffffff;
                    border: 1px solid #7cc2e6;
                    padding: 20px;
                    border-radius: 8px;
                    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
                  ">
                  <h5 style="
                    font-size: 1.5rem;
                    text-align: center;
                    color: black;
                    text-decoration: underline;
                    margin-bottom: 20px;">
                    <b>Reset Password</b>
                  </h5>
            
                  <form id="resetPasswordForm">
                    <div class="row g-3">
                      <!-- Employee ID -->
                      <div class="col-md-3">
                        <div>
                          <label for="employeeId" class="form-label"><b>Employee ID:</b><span class="text-danger">*</span></label>
                          <div class="position-relative">
                            <input type="text" id="employeeId" class="form-control" maxlength="10" placeholder="Enter your employee ID" required />
                          </div>
                          <div class="text-danger small" id="employeeIdError"></div>
                        </div>
                      </div>
                      
                      <!-- New Password -->
                      <div class="col-md-3">
                        <div>
                          <label for="newPassword" class="form-label"><b>New Password:</b><span class="text-danger">*</span></label>
                          <div class="input-group">
                            <input type="password" id="newPassword" class="form-control" placeholder="Enter new password" required />
                            <span class="input-group-text">
                              <i id="togglePasswordNew" class="fas fa-eye-slash toggle-password" tabindex="0" role="button" aria-label="Toggle new password visibility" style="cursor:pointer;"></i>
                            </span>
                          </div>
                          <div class="text-danger small" id="newPasswordError"></div>
                        </div>
                      </div>
                      
                      <!-- Confirm Password -->
                      <div class="col-md-3">
                        <div>
                          <label for="confirmPassword" class="form-label"><b>Confirm Password:</b><span class="text-danger">*</span></label>
                          <div class="input-group">
                            <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm new password" required />
                            <span class="input-group-text">
                              <i id="togglePasswordConfirm" class="fas fa-eye-slash toggle-password" tabindex="0" role="button" aria-label="Toggle confirm password visibility" style="cursor:pointer;"></i>
                            </span>
                          </div>
                          <div class="text-danger small" id="confirmPasswordError"></div>
                        </div>
                      </div>
                    
                      <!-- Submit Button (aligned with inputs) -->
                      <div class="col-md-3">
                        <div class="d-flex align-items-end" style="height: 100%;">
                          <button type="submit" class="btn" style="background-color:#007080;color:white;" >
                            <span id="submitText"><strong>Submit</strong></span>
                            <div id="spinner" class="spinner-border spinner-border-sm text-light" role="status" style="display: none;">
                              <span class="visually-hidden">Loading...</span>
                            </div>
                          </button>
                        </div>
                      </div>
                    </div>
                    
                    
            
                  
                    {% comment %} <div class="d-flex justify-content-center mt-4 ">
                      <button type="submit" class="btn" style="background-color:#007080;color:white; width: 200px;">
                        <span id="submitText"><strong>Submit</strong></span>
                        <div id="spinner" class="spinner-border spinner-border-sm text-light" role="status" style="display: none;">
                          <span class="visually-hidden">Loading...</span>
                        </div>
                      </button>
                    </div> {% endcomment %}
            
                    <!-- Message -->
                    <div id="message" class="message mt-3 text-center"></div>
                  </form>
                </div>
              </div>
            </div>
            
            
          </form>
       

  <script>
 $(document).ready(function () {
  // Toggle password visibility
  function togglePasswordVisibility(inputId, iconElement) {
    const $input = $(inputId);
    const currentType = $input.attr('type');
    const newType = currentType === 'password' ? 'text' : 'password';
    $input.attr('type', newType);

    // Toggle icon class
    $(iconElement)
      .toggleClass('fa-eye-slash', newType === 'password')
      .toggleClass('fa-eye', newType === 'text');
  }

  // Toggle for New Password
  $('#togglePasswordNew').on('click keydown', function (e) {
    if (e.type === 'click' || (e.type === 'keydown' && (e.key === 'Enter' || e.key === ' '))) {
      togglePasswordVisibility('#newPassword', this);
      e.preventDefault();
    }
  });

  // Toggle for Confirm Password
  $('#togglePasswordConfirm').on('click keydown', function (e) {
    if (e.type === 'click' || (e.type === 'keydown' && (e.key === 'Enter' || e.key === ' '))) {
      togglePasswordVisibility('#confirmPassword', this);
      e.preventDefault();
    }
  });

  // (Keep the rest of your form validation and submission logic)



      $('#employeeId').focus();

      // Form submission handler
      $('#reset-password-form').submit(function (event) {
        event.preventDefault();

        const $message = $('#message');
        $message.removeClass('success-message error-message').text('');

        const employeeId = $('#employeeId').val().trim();
        const newPassword = $('#newPassword').val();
        const confirmPassword = $('#confirmPassword').val();

        // Clear error messages
        $('#employeeIdError').text('');
        $('#newPasswordError').text('');
        $('#confirmPasswordError').text('');

        let hasError = false;

        if (!employeeId) {
          $('#employeeIdError').text('Please enter your employee ID.');
          hasError = true;
        }
        if (!newPassword) {
          $('#newPasswordError').text('Please enter a new password.');
          hasError = true;
        } else if (newPassword.length < 8) {
          $('#newPasswordError').text('Password must be at least 8 characters.');
          hasError = true;
        }
        if (!confirmPassword) {
          $('#confirmPasswordError').text('Please confirm your new password.');
          hasError = true;
        }
        if (newPassword && confirmPassword && newPassword !== confirmPassword) {
          $('#confirmPasswordError').text("Passwords don't match.");
          hasError = true;
        }

        if (hasError) return;

        // Disable submit button and show spinner
        $('.btn.sign-in-btn').prop('disabled', true);
        $('#submitText').hide();
        $('#spinner').show();

        $.ajax({
          url: "{% url 'forgot_password' %}",
          type: "POST",
          data: {
            employee_id: employeeId,
            new_password: newPassword,
            confirm_password: confirmPassword,
            csrfmiddlewaretoken: '{{ csrf_token }}'
          },
          success: function (response) {
            $message.text(response.message).addClass('success-message');
            $('#spinner').hide();
            $('#submitText').text('Success!').show();

            setTimeout(() => {
              window.location.href = "{% url 'login' %}";
            }, 2000);
          },
          error: function (xhr) {
            $('#spinner').hide();
            $('#submitText').text('Submit').show();
            $('.btn.sign-in-btn').prop('disabled', false);

            let errorMessage = "An error occurred. Please try again.";
            try {
              const errorResponse = JSON.parse(xhr.responseText);
              if (errorResponse.message) errorMessage = errorResponse.message;
            } catch {}

            $message.text(errorMessage).addClass('error-message');
          }
        });
      });
    });
  </script>
</body>
{%endblock%}
