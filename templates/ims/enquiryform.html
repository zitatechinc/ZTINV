        left: 0;

    $(document).on('click', '#downloadPdfBtn', async function () {
        const { jsPDF } = window.jspdf;
        showLoader();
        // Find the parent .tab-pane of the clicked button
        const $tabPane = $(this).closest('.tab-pane');
     
        // UI cleanup
        $('.editDueDateBtn, .submitDueDate, #downloadPdfBtn, #vendorTabContent .nav-tabs').hide();
        $('.enquiry-container').addClass('hide-border expand-content');
     
        const tabId = $tabPane.attr('id');
        document.getElementById(`${tabId}-innerTabContent`)?.classList.remove('with-bg');
        $(".submitDueDate").hide();
     
        // Extract enquiry number
        let enquiryNo = 'enquiry';
        const subjectText = $tabPane.find('.header').text();
        const match = subjectText.match(/EN\s*-\s*([A-Za-z0-9]+)/);
        if (match) enquiryNo = `EN-${match[1]}`;
        
        console.log("Extracted enquiry number for PDF filename:", enquiryNo);

     
        // Setup PDF
        const pdf = new jsPDF('p', 'mm', 'a4');
        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();
        const margin = 12.7;
        const padding = 5;
        
        const usableWidth = pageWidth - 2 * margin;
        const usableHeight = pageHeight - 3 * margin;
     
        const pageCanvas = document.createElement('canvas');
        const pageCtx = pageCanvas.getContext('2d');
     
        // Load logo
        const logoUrl = '{% static "images/priya.png" %}';
        const logoImg = new Image();
        logoImg.crossOrigin = 'anonymous';
        logoImg.src = logoUrl;
     
        logoImg.onload = async function () {
            const canvas = await html2canvas($tabPane[0], {
                scale: 2,
                useCORS: true,
                width: $tabPane[0].scrollWidth,
            });
     
            const canvasWidth = canvas.width;
            const canvasHeight = canvas.height;
            const sliceHeightInCanvas = (usableHeight * canvasWidth) / usableWidth;
            const totalPages = Math.ceil(canvasHeight / sliceHeightInCanvas);
     
            pageCanvas.width = canvasWidth;
     
            for (let i = 0; i < totalPages; i++) {
                const sourceY = i * sliceHeightInCanvas;
                const remainingHeight = canvasHeight - sourceY;
                const sliceHeight = Math.min(sliceHeightInCanvas, remainingHeight);
     
                pageCanvas.height = sliceHeight;
                pageCtx.clearRect(0, 0, canvasWidth, sliceHeight);
                pageCtx.drawImage(
                    canvas,
                    0, sourceY, canvasWidth, sliceHeight,
                    0, 0, canvasWidth, sliceHeight
                );
     
                const imageData = pageCanvas.toDataURL('image/png');
                const imgHeightInPDF = (sliceHeight * usableWidth) / canvasWidth;
     
                if (i > 0) pdf.addPage();
     
                const paddedX = margin + padding;
                const paddedY = margin + padding;
                const paddedWidth = usableWidth - 2 * padding;
                const paddedHeight = imgHeightInPDF - 2 * padding;
     
                pdf.addImage(imageData, 'PNG', paddedX, paddedY, paddedWidth, paddedHeight);
     
                // Optional border
                pdf.setDrawColor(0);
                pdf.setLineWidth(0.5);
                pdf.rect(margin, margin, usableWidth, usableHeight);
     
                // Centered logo
                const logoWidth = 130;
                const logoHeight = (logoImg.height / logoImg.width) * logoWidth;
                const logoX = (pageWidth - logoWidth) / 2;
                const logoY = (pageHeight - logoHeight) / 2;
                //pdf.addImage(logoImg, 'PNG', logoX, logoY, logoWidth, logoHeight);
            }
            hideLoader();
            pdf.save(`${enquiryNo}.pdf`);
     
            // Download any spec documents in this vendor tab
            $tabPane.find('.spec-document-link').each(async function () {
                try {
                    const url = this.href;

                    const filename = url.split('/').pop();
            
                    const response = await fetch(url);
            
                    if (!response.ok) {
                        console.warn(`Failed to fetch ${url}: ${response.status} ${response.statusText}`);
                        return;
                    }
            
                    const contentType = response.headers.get('Content-Type') || '';
                    if (!contentType.includes('pdf')) {
                        console.warn(`Expected PDF but got ${contentType} for ${url}`);
                        return;
                    }
            
                    const blob = await response.blob();
                    saveAs(blob, filename);
                } catch (err) {
                    console.warn(`Could not download ${this.href}`, err);
                }
            });
            
     
            // Restore UI
            $('.editDueDateBtn,  #downloadPdfBtn, #vendorTabContent .nav-tabs').show();
            $('.enquiry-container').removeClass('hide-border expand-content');
        };
     
        logoImg.onerror = function () {
            showWarningAlert("Failed to load logo image. PDF will be saved without it.");
            pdf.save(`${enquiryNo}.pdf`);
            $('.editDueDateBtn, .submitDueDate, #downloadPdfBtn, #vendorTabContent .nav-tabs').show();
            hideLoader();
            $('.enquiry-container').removeClass('hide-border expand-content');
        };
    });
    document.querySelectorAll('input[type="file"]').forEach(input => {
        input.addEventListener('change', function () {
            const file = this.files[0];
            if (file && file.type !== 'application/pdf') {
                showAlert('Only PDF files are allowed.');
                this.value = ''; // Clear the input
            }
        });
    });
    function newItemOfSidebar(prc_data) {
    const backgroundColor = prc_data.action_performed ? '#fff' : '#CCE5F0';

    let prc_div = document.getElementById(prc_id);

    if (prc_div) {
        const oldDatetimeRaw = prc_div.getAttribute('data-datetime');

        // Only move to top if action_performed is true AND datetime changed
        if (prc_data.action_performed && oldDatetimeRaw !== newDatetimeRaw) {
            prc_div.remove();
            prc_div.setAttribute('data-datetime', newDatetimeRaw);
            prc_div.style.backgroundColor = backgroundColor;
            prcSidebar.insertBefore(prc_div, prcSidebar.firstChild);
        } else {
            // Just update background color
            prc_div.style.backgroundColor = backgroundColor;
        }

        // Update procurement title if it exists

        if (titleDiv) {
            titleDiv.textContent = prc_data.procurement_title || "No Title";
        }

    function formatDateForInput(dateStr) {
        if (!dateStr) return '';
        const dateObj = new Date(dateStr);
        if (isNaN(dateObj.getTime())) return '';
        const year = dateObj.getFullYear();
        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
        const day = String(dateObj.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      }
      
      function formatDateForDisplay(dateStr) {
        if (!dateStr) return '';
        const dateObj = new Date(dateStr);
        if (isNaN(dateObj.getTime())) return '';
        const day = String(dateObj.getDate()).padStart(2, '0');
        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
        const year = dateObj.getFullYear();
        return `${day}-${month}-${year}`;
      }

          const container = event.target.closest('.staggered-container');
          const index = container.getAttribute('data-index');
          const totalQty = parseInt(container.getAttribute('data-totalqty'), 10);
          const entriesDiv = container.querySelector('.staggered-entries');
      
          const getTotalEnteredQty = () => {
            let total = 0;
            entriesDiv.querySelectorAll('.quantity-input').forEach(input => {
              const val = parseInt(input.value, 10);
              total += !isNaN(val) ? val : 0;
            });
            return total;
          };
      
          const currentQty = getTotalEnteredQty();
          if (currentQty >= totalQty) {
            alert('Total quantity limit reached');
            return;
          }
      
          const idx = entriesDiv.querySelectorAll('.staggered-entry').length;
      
          const entryDiv = document.createElement('div');
          entryDiv.className = 'staggered-entry';
          entryDiv.innerHTML = `
            <input
              type="number"
              name="quantity-${index}-${idx}"
              class="form-control quantity-input"
              placeholder="Qty"
              min="1"
              required
            />
            <input
              type="date"
              name="expectedDate-${index}-${idx}"
              class="form-control date-input"
              required
            />
          `;
          entriesDiv.appendChild(entryDiv);

          const container = event.target.closest('.staggered-container');
          const entriesDiv = container.querySelector('.staggered-entries');
          const allEntries = entriesDiv.querySelectorAll('.staggered-entry');
          if (allEntries.length > 1) {
            entriesDiv.removeChild(allEntries[allEntries.length - 1]);
          }
        }
      });

        function parseDateFromAnyFormat(dateStr) {
            if (!dateStr) return null;
        
            // Handle dd-mm-yyyy

                return new Date(`${year}-${month}-${day}`);
