<head>
{% load static %}
 <script src="{% static "js/jquery-3.6.0.min.js" %}"></script>
  <script src="{% static "fullcalendar/main.min.js" %}"></script>
  <script src="{% static "js/popper.min.js" %}"></script>
  <script src="{% static "js/bootstrap.bundle.min.js" %}"></script>
  <script src="{% static "js/owl.carousel.min.js" %}"></script>
  <script src="{% static "js/owlcarousel2-filter.min.js" %}"></script>
  <script src="{% static "js/jquery.dataTables.min.js" %}"></script>
  <script src="{% static "js/dataTables.buttons.min.js" %}"></script>
  <script src="{% static "js/jszip.min.js" %}"></script>
  <script src="{% static "js/buttons.html5.min.js" %}"></script>
  <script src="{% static "js/chart.js" %}"></script>
  <script src="{% static "js/html2pdf.bundle.min.js" %}"></script>
  <script src="{% static "js/plotly-latest.min.js" %}"></script>
  <script src="{% static "js/intlTelInput.min.js" %}"></script>
  <script src="{% static "js/select2.min.js" %}"></script>
  <script src="{% static "js/sweetalert2@11.js" %}"></script>
  <script src="{% static "js/mark.min.js" %}"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>


{% block mainblock %}

    <meta name="csrf-token" content="{{ csrf_token }}">
    <style>
        .active-po {
            background-color: #00B2CC !important;
        }
        #select-po-message {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 70vh;
            font-size: 1.3rem;
            color: #555;
            font-weight: 500;
            text-align: center;
            padding: 20px;
        }
        .card {
            box-shadow: 0 4px 10px rgb(0 0 0 / 0.1);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            background: white;
        }
        #payment-table thead {
            background-color: #007080;
            color: white;
        }
        #payment-table tbody tr:hover {
            background-color: #e9f5f5;
        }
        .btn-upload {
            background-color: #007080;
            border-color: #007080;
            color: white;
        }
        .btn-upload:hover {
            background-color: #005f5f;
            border-color: #005f5f;
        }
    </style>
</head>

<!-- 🔽 Dropdown Filter Form -->
<div class="container mb-4">
    <form id="filterForm">
        <div class="row g-3 align-items-center">
            <div class="col-md-4">
                <label for="poSelect" class="form-label fw-bold">Select PO ID:</label>
                <select class="form-select" name="poid" id="poSelect">
                    <option value="">-- Select PO --</option>
                    {% for poid in po_ids %}
                        <option value="{{ poid }}">{{ poid }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </form>
</div>

<div id="select-po-message">
    Please select a PO from the dropdown to view details.
</div>

<div id="payment-details" class="card" style="display:none;">
    <h3 class="mb-4">PO Details</h3>
    <div class="table-responsive">
        <table id="payment-table" class="table table-striped table-hover">
            <thead>
                <tr>
                    <th>PO Number</th>
                    <th>Vendor</th>
                    
                    <th>PO Created Date</th>
                    <th>Created By</th>
                    <th>PO Requested By</th>
                    <th>Delivery</th>
                    <th>Stage DateTime</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>


{% endblock %}
{%block scripts%}
<script>
    
$(document).ready(function(){
    $('#poSelect').change(function(){
        var poid = $(this).val();
        if(poid === ""){
            $('#payment-details').hide();
            $('#select-po-message').show();
            return;
        }

        $.ajax({
            url: "{% url 'po_data' %}",  // Replace with your URL name
            type: "POST",
            data: {
                'poid': poid,
                'csrfmiddlewaretoken': '{{ csrf_token }}'
            },
            success: function(response){
                console.log(response)
                var tbody = $('#payment-table tbody');
                tbody.empty();

                if(response.po_data.length > 0){
                    $('#select-po-message').hide();
                    $('#payment-details').show();

                    $.each(response.po_data, function(i, po){
                        var row = '<tr>'+
                            '<td>'+po.poid+'</td>'+
                            '<td>'+po.vendor_company+'</td>'+
                          
                            '<td>'+po.po_created_date+'</td>'+
                            '<td>'+po.imm_user+'</td>'+
                            '<td>'+po.raised_user+'</td>'+
                            '<td>'+po.delivery_date+'</td>'+
                            '<td>'+po.stage_datetime+'</td>'+
                            '</tr>';
                        tbody.append(row);
                    });
                } else {
                    $('#payment-details').hide();
                    $('#select-po-message').text("No PO details found for selected ID").show();
                }
            }
        });
    });
});
</script>

{%endblock%}
