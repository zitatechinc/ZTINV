{% extends 'index.html' %}
{%load static%}
{% block mainblock %}

<div class="row mb-3 d-flex align-items-center">
    <div class="col-md-2" style="padding-right: 5px;">
        <label class="form-label">Procurement ID</label>
        <input type="text" class="form-control" name="procurement_id" value="${selected_pr}" readonly style="width: 100%;">
    </div>

    <div class="col-md-2" style="padding-right: 5px;">
        <label class="form-label">Material</label>
        <input type="text" class="form-control" name="procurement_type" value="${modifieddata.procurement_type}" readonly>
    </div>
    
    <div class="col-md-2" style="padding-right: 5px;">
        <label class="form-label">Project</label>
        <input type="text" class="form-control" name="project" value="${modifieddata.project}" readonly>
    </div>
    
    <div class="col-md-2" style="padding-right: 5px;">
        <label class="form-label">Import/Indigenous</label>
        <input type="text" class="form-control" name="import_indigenous" value="${modifieddata.import_indigenous}" readonly>
    </div>
    
    <div class="col-md-2" style="padding-right: 5px;">
        <label class="form-label">Tender Type</label>
        <input type="text" class="form-control" name="tender_type" value="${modifieddata.tender_type}" readonly>
    </div>
    
    <div class="col-md-2 d-flex align-items-center" style="padding-left: 0;">
        <button type="button" class="btn btn-success add-row-btn" style="width: 28%; margin-top:16%;">
            <i class="fas fa-plus"></i>
        </button>
    </div>
</div>




{% endblock mainblock %}
